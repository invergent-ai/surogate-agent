@if (open) {
  <!-- Backdrop -->
  <div
    class="settings-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
  >
    <!-- Dialog -->
    <div class="bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl w-full max-w-xl mx-4 overflow-hidden border border-gray-100 dark:border-zinc-800">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-zinc-800">
        <h2 class="text-base font-semibold text-gray-900 dark:text-zinc-50">Settings</h2>
        <button
          type="button"
          (click)="cancel()"
          class="text-gray-400 dark:text-zinc-500 hover:text-gray-600 dark:hover:text-zinc-300 transition-colors"
          aria-label="Close"
        >
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Tab bar -->
      <div class="flex border-b border-gray-100 dark:border-zinc-800 px-6">
        <button
          type="button"
          (click)="activeTab = 'settings'"
          class="px-1 py-3 text-sm font-medium border-b-2 transition-colors mr-6"
          [class.border-amber-400]="activeTab === 'settings'"
          [class.text-gray-900]="activeTab === 'settings'"
          [class.dark:text-zinc-50]="activeTab === 'settings'"
          [class.border-transparent]="activeTab !== 'settings'"
          [class.text-gray-500]="activeTab !== 'settings'"
          [class.dark:text-zinc-400]="activeTab !== 'settings'"
          [class.hover:text-gray-700]="activeTab !== 'settings'"
          [class.dark:hover:text-zinc-200]="activeTab !== 'settings'"
        >
          Model &amp; Keys
        </button>
        @if (auth.currentUser()?.role === 'developer') {
          <button
            type="button"
            (click)="activeTab = 'experts'"
            class="px-1 py-3 text-sm font-medium border-b-2 transition-colors mr-6"
            [class.border-amber-400]="activeTab === 'experts'"
            [class.text-gray-900]="activeTab === 'experts'"
            [class.dark:text-zinc-50]="activeTab === 'experts'"
            [class.border-transparent]="activeTab !== 'experts'"
            [class.text-gray-500]="activeTab !== 'experts'"
            [class.dark:text-zinc-400]="activeTab !== 'experts'"
            [class.hover:text-gray-700]="activeTab !== 'experts'"
            [class.dark:hover:text-zinc-200]="activeTab !== 'experts'"
          >
            Experts
          </button>
          <button
            type="button"
            (click)="activeTab = 'mcp'"
            class="px-1 py-3 text-sm font-medium border-b-2 transition-colors"
            [class.border-amber-400]="activeTab === 'mcp'"
            [class.text-gray-900]="activeTab === 'mcp'"
            [class.dark:text-zinc-50]="activeTab === 'mcp'"
            [class.border-transparent]="activeTab !== 'mcp'"
            [class.text-gray-500]="activeTab !== 'mcp'"
            [class.dark:text-zinc-400]="activeTab !== 'mcp'"
            [class.hover:text-gray-700]="activeTab !== 'mcp'"
            [class.dark:hover:text-zinc-200]="activeTab !== 'mcp'"
          >
            MCP Servers
          </button>
        }
      </div>

      <!-- Body -->
      <div class="px-6 py-5 max-h-[80vh] overflow-y-auto">

        <!-- Model & Keys tab -->
        @if (activeTab === 'settings') {
          @if (saveError()) {
            <div class="mb-4 px-3 py-2.5 rounded-lg bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-400">
              {{ saveError() }}
            </div>
          }
          <app-model-keys
            [config]="draftConfig"
            (configChange)="draftConfig = $event"
          />
        }

        <!-- Experts tab -->
        @if (activeTab === 'experts') {
          <app-experts-panel />
        }

        <!-- MCP Servers tab -->
        @if (activeTab === 'mcp') {
          <app-mcp-panel />
        }

      </div>

      <!-- Footer (only for Model & Keys tab) -->
      @if (activeTab === 'settings') {
        <div class="flex justify-end gap-2 px-6 py-4 border-t border-gray-100 dark:border-zinc-800 bg-gray-50 dark:bg-zinc-800/50">
          <button
            type="button"
            (click)="cancel()"
            [disabled]="saving()"
            class="px-4 py-2 text-sm text-gray-600 dark:text-zinc-400 hover:text-gray-800 dark:hover:text-zinc-200 rounded-lg hover:bg-gray-100 dark:hover:bg-zinc-700 disabled:opacity-40 transition-colors"
          >
            Cancel
          </button>
          <button
            type="button"
            (click)="save()"
            [disabled]="!canSave"
            class="px-4 py-2 text-sm font-medium text-zinc-900 bg-brand hover:bg-brand-500 rounded-lg disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
          >
            {{ saving() ? 'Saving…' : 'Save' }}
          </button>
        </div>
      }

    </div>
  </div>
}
